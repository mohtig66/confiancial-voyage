<!-- ✅ EN-TÊTE STYLE SUMMER CAMP (FRANÇAIS) -->
<header>
  <nav class="navbar">
    <div class="logo">
      <a href="index-fr.html" class="text-2xl font-bold text-cvnavy">Confiancial Voyage</a>
    </div>

    <ul class="nav-links">
      <li><a href="index-fr.html">Accueil</a></li>
      <li><a href="summercamps-fr.html">Colonies de Vacances</a></li>
      <li><a href="feedback-fr.html" class="active">Avis</a></li>

    <div class="language-switcher">
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="fr" selected>Français</option>
      </select>
    </div>

    <div class="mobile-menu" id="mobileMenu">☰</div>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const mobileMenu = document.getElementById("mobileMenu");
      const navLinks = document.querySelector(".nav-links");

      if (mobileMenu && navLinks) {
        mobileMenu.addEventListener("click", () => {
          navLinks.classList.toggle("active");
        });
      }

      // ✅ Script de changement de langue (fonctionne sur Netlify)
      const languageSelect = document.getElementById("languageSelect");
      languageSelect.addEventListener("change", function () {
        const lang = this.value;
        let current = window.location.pathname.split("/").pop() || "feedback-fr.html";
        let baseName = current.replace("-fr", "").replace(".html", "");
        let newFile = baseName + (lang === "fr" ? "-fr.html" : ".html");
        window.location.href = newFile;
      });
    });
  </script>

  <style>
    header {
      background-color: #ffffffcc;
      backdrop-filter: blur(6px);
      padding: 12px 24px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;

      margin: auto;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }

    .nav-links a {

      color: #0d1b2a;

      transition: color 0.3s;

    .language-switcher select {
      padding: 5px 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
      color: #0d1b2a;

    }

      display: none;
      cursor: pointer;
      font-size: 24px;
      color: #0d1b2a;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;

        background-color: white;
        width: 100%;
        position: absolute;
        top: 65px;

        padding: 15px 0;
        text-align: center;

<!-- FEEDBACK SECTION -->
<section class="max-w-3xl mx-auto px-6 py-12">
  <h2 class="text-3xl font-bold text-cvnavy mb-6 text-center">Laissez votre avis</h2>

  <form id="feedbackForm" class="flex flex-col gap-4 bg-white p-6 rounded-lg shadow-md">
    <input id="name" placeholder="Votre nom" required
      class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cvgold">

    <input id="phone" placeholder="Votre numéro de téléphone (facultatif)" type="tel"
      class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cvgold">

    <textarea id="message" placeholder="Votre message" required rows="5"
      class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cvgold"></textarea>

    <button type="submit"
      class="bg-cvgold text-cvnavy font-semibold py-2 rounded hover:scale-105 transition">
      Envoyer
    </button>
  </form>

  <div id="feedbackList" class="mt-8 space-y-3"></div>
</section>

<!-- ✅ Script Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

  // 🔧 Votre configuration Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyBSEtByI85Igp0YWmOU095Ftc1GNHXWNZw",
    authDomain: "confiancialvoyage.firebaseapp.com",
    databaseURL: "https://confiancialvoyage-default-rtdb.firebaseio.com",
    projectId: "confiancialvoyage",
    storageBucket: "confiancialvoyage.firebasestorage.app",
    messagingSenderId: "910033769629",
    appId: "1:910033769629:web:2943d65bfe24fe8bb9b074",
    measurementId: "G-EY3EWC6CQB"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const feedbackRef = ref(db, "feedbacks");

  const feedbackForm = document.getElementById("feedbackForm");
  const feedbackList = document.getElementById("feedbackList");

  // 📨 Envoi du message
  feedbackForm.addEventListener("submit", (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const message = document.getElementById("message").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const date = new Date().toLocaleString("fr-FR", {
      dateStyle: "medium",
      timeStyle: "short"
    });

    if (name && message) {
      push(feedbackRef, { name, message, phone, date });
      feedbackForm.reset();
    }
  });

  // 🔄 Affichage en direct (avec date)
  onValue(feedbackRef, (snapshot) => {
    const data = snapshot.val();
    feedbackList.innerHTML = data
      ? Object.values(data)
          .reverse()
          .map(f => `
            <div class="bg-gray-50 p-4 rounded shadow">
              <p class="font-semibold text-cvnavy">${f.name}</p>
              <p class="text-gray-700 mb-1">${f.message}</p>
              ${f.date ? `<p class="text-sm text-gray-500">Publié le ${f.date}</p>` : ""}
            </div>
          `)
          .join("")
      : "";
  });
</script>

<script>
  // Feedback form dynamic update
  const formFR = document.getElementById('feedbackFormFR');
  const feedbacksContainerFR = document.getElementById('feedbacksFR');

  formFR.addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(formFR);
    const name = formData.get('name');
    const feedback = formData.get('feedback');

    const newFeedback = document.createElement('div');
    newFeedback.classList.add('bg-babyblue', 'p-6', 'rounded-2xl', 'shadow', 'relative', 'fade-in');
    newFeedback.innerHTML = `
      <button class="absolute top-2 right-2 text-red-500 hover:text-red-700 font-bold" onclick="this.parentElement.remove()">×</button>
      <h3 class="font-semibold text-cvnavy mb-2">${name}</h3>
      <p>"${feedback}"</p>
    `;
    feedbacksContainerFR.prepend(newFeedback);

    const response = await fetch(formFR.action, {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      formFR.reset();
    } else {
      alert('Erreur lors de l\'envoi de votre retour. Veuillez réessayer.');
    }
  });
</script>
