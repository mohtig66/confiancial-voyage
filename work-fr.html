<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travaillez Avec Nous - Confiancial Voyage</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cvnavy: '#0b2545',
          cvgold: '#d4af37',
          babyblue: '#cce6ff'
        }
      }
    }
  }
</script>
<style>
  body { overflow-x: hidden; }
  .circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.2;
    animation: float 20s linear infinite;
  }
  .circle1 { width: 200px; height: 200px; background: #0b2545; top: -50px; left: -50px; }
  .circle2 { width: 150px; height: 150px; background: #cce6ff; top: 300px; right: -75px; }
  .circle3 { width: 100px; height: 100px; background: #0b2545; bottom: 100px; left: 50px; }
  @keyframes float {
    0% { transform: translateY(0) rotate(0deg);}
    50% { transform: translateY(-50px) rotate(180deg);}
    100% { transform: translateY(0) rotate(360deg);}
  }
</style>
</head>
<body class="font-sans bg-gradient-to-br from-cvnavy via-babyblue to-white min-h-screen relative">

<!-- Cercles décoratifs -->
<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<!-- HEADER -->
<header>
  <nav class="navbar">
    <div class="logo">
      <a href="index-fr.html" class="text-2xl font-bold text-cvnavy">Confiancial Voyage</a>
    </div>

    <ul class="nav-links">
      <li><a href="index-fr.html">Accueil</a></li>
      <li><a href="summercamps-fr.html">Colonies de Vacances</a></li>
      <li><a href="feedback-fr.html">Avis</a></li>
      <li><a href="work-fr.html" class="active">Travaillez avec Nous</a></li>
    </ul>

    <div class="language-switcher">
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="fr" selected>Français</option>
      </select>
    </div>

    <div class="mobile-menu" id="mobileMenu">☰</div>
  </nav>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const mobileMenu = document.getElementById("mobileMenu");
      const navLinks = document.querySelector(".nav-links");
      if (mobileMenu && navLinks) {
        mobileMenu.addEventListener("click", () => {
          navLinks.classList.toggle("active");
        });
      }

      // Changement de langue
      const languageSelect = document.getElementById("languageSelect");
      languageSelect.addEventListener("change", function () {
        const lang = this.value;
        let current = window.location.pathname.split("/").pop() || "work-fr.html";
        let baseName = current.replace("-fr", "").replace(".html", "");
        let newFile = baseName + (lang === "fr" ? "-fr.html" : ".html");
        window.location.href = newFile;
      });
    });
  </script>

  <style>
    header {
      background-color: #ffffffcc;
      backdrop-filter: blur(6px);
      padding: 12px 24px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1100px;
      margin: auto;
    }
    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
    }
    .nav-links a {
      text-decoration: none;
      color: #0d1b2a;
      font-weight: 500;
      transition: color 0.3s;
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: #d4af37;
    }
    .language-switcher select {
      padding: 5px 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
      color: #0d1b2a;
      background: white;
    }
    .mobile-menu {
      display: none;
      cursor: pointer;
      font-size: 24px;
      color: #0d1b2a;
    }
    @media (max-width: 768px) {
      .nav-links {
        display: none;
        flex-direction: column;
        background-color: white;
        width: 100%;
        position: absolute;
        top: 65px;
        left: 0;
        padding: 15px 0;
        text-align: center;
      }
      .nav-links.active {
        display: flex;
      }
      .mobile-menu {
        display: block;
      }
    }
  </style>
</header>

<!-- FORMULAIRE -->
<section class="max-w-4xl mx-auto px-6 py-16 relative z-10">
  <h1 class="text-3xl font-bold text-cvnavy mb-6 text-center">Travaillez Avec Nous</h1>
  <p class="text-center text-gray-700 mb-12">
    Vous souhaitez rejoindre notre équipe ou collaborer avec nous ? Remplissez le formulaire ci-dessous et nous vous contacterons rapidement !
  </p>

  <form action="https://formspree.io/f/mblzvlaa" method="POST" class="flex flex-col gap-4 bg-white p-6 rounded-lg shadow-md">
    <input type="text" name="name" placeholder="Votre nom ou nom de l'entreprise" required
      class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cvgold">
    <input type="email" name="email" placeholder="Votre adresse e-mail" required
      class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cvgold">
    <input type="tel" name="phone" placeholder="Votre numéro de téléphone (facultatif)"
      class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cvgold">
    <textarea name="message" placeholder="Présentez votre entreprise et comment vous souhaitez collaborer avec nous" required rows="5"
      class="border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cvgold"></textarea>
    <button type="submit"
      class="bg-cvgold text-cvnavy font-semibold py-2 rounded hover:scale-105 transition">
      Envoyer le message
    </button>
  </form>

  <script>
    const form = document.querySelector("form");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = new FormData(form);
      const response = await fetch(form.action, {
        method: form.method,
        body: data,
        headers: { 'Accept': 'application/json' }
      });
      if (response.ok) {
        alert("✅ Merci pour votre message ! Nous vous répondrons bientôt.");
        form.reset();
      } else {
        alert("❌ Une erreur est survenue. Veuillez réessayer.");
      }
    });
  </script>
</section>

</body>
</html>
